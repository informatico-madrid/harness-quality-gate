name: CI

on:
  push:
    branches: [main, "spec/**"]
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        php: ["8.2", "8.3", "8.4"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php }}"
          tools: composer:v2

      - name: Composer install
        run: composer install --no-progress --prefer-dist

      - name: Install Python package
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check harness_quality_gate/ tests/

      - name: Type check (mypy)
        run: mypy harness_quality_gate/

      - name: Tests + coverage
        run: pytest --cov=harness_quality_gate --cov-fail-under=100 -q

      - name: Mutation testing
        run: |
          mutmut run --paths-to-mutate=harness_quality_gate/ || true
          python -m harness_quality_gate audit-ignores . --concurrency=sequential

      - name: Self-application (full gate)
        run: python -m harness_quality_gate full --repo . --concurrency=sequential
