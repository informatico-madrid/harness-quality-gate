name: CI

on:
  push:
    branches: [main, "spec/**"]
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        php: ["8.2", "8.3", "8.4"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php }}"
          tools: composer:v2

      - name: Composer install
        run: composer install --no-progress --prefer-dist
        working-directory: harness_quality_gate/adapters/php/visitors

      - name: Install Python package
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check harness_quality_gate/ tests/

      - name: Type check (mypy)
        run: mypy harness_quality_gate/

      - name: Tests + coverage
        run: pytest --cov=harness_quality_gate --cov-fail-under=100 -q

      - name: Mutation testing (100% — no survivors allowed)
        run: |
          # Coverage scope MUST match the mutmut runner (tests/unit) so that
          # mutate_only_covered_lines mutates exactly what the runner can kill.
          pytest tests/unit/ -q -p no:randomly --cov=harness_quality_gate --cov-report=
          mutmut run
          mutmut export-cicd-stats
          python -c "import json,sys; s=json.load(open('mutants/mutmut-cicd-stats.json')); print(s); sys.exit(1 if (s['survived'] or s['no_tests'] or s['suspicious'] or s['timeout']) else 0)"

      - name: Audit suppressions (PHP @infection-ignore-all + Python pragmas)
        # Audit only the package source, not vendor/mutants/tests/fixtures
        run: python -m harness_quality_gate audit-ignores harness_quality_gate

      - name: Self-application (full gate, dogfood)
        run: python -m harness_quality_gate all --repo . --concurrency=sequential
