rules:
# =====================================================================
# JavaScript/TypeScript/Node.js Security Rules
# Converted from supercent-io/security-best-practices patterns
# Scope: Playwright tests, auth setup, Node.js tooling in this project
# Provenance: Each rule includes documentation_url to original source
# =====================================================================

# Rule 1: eval() usage — code injection
- id: js-eval-usage
  patterns:
  - pattern-either:
    - pattern: eval($EXPR)
    - pattern: new Function($EXPR)
    - pattern: setTimeout($STR, ...)
  - pattern-not-inside:
      eval("use strict")
  message: "eval()/Function()/setTimeout(string) enables code injection. Use JSON.parse() for data, or refactor to direct function calls."
  severity: ERROR
  languages: [javascript, typescript]
  metadata:
    category: security
    cwe: "CWE-94: Code Injection"
    owasp: "A03:2021 - Injection"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-eval-usage.md

# Rule 2: Hardcoded secrets in JS/TS
- id: js-hardcoded-secret
  patterns:
  - pattern-either:
    - pattern: |
        const $VAR = "..."
    - pattern: |
        $OBJ.password = "..."
    - pattern: |
        $OBJ.apiKey = "..."
    - pattern: |
        $OBJ.secret = "..."
    - pattern: |
        $OBJ.token = "..."
  - pattern-not:
      const $VAR = ""
  - pattern-not:
      const $VAR = process.env.$ENV
  - pattern-not:
      const $VAR = $CONFIG.$KEY
  - metavariable-regex:
      metavariable: $VAR
      regex: (?i)(password|secret|api_key|apikey|token|auth|credential|private_key)
  message: "Hardcoded secret detected. Use environment variables or a secrets manager."
  severity: ERROR
  languages: [javascript, typescript]
  metadata:
    category: security
    cwe: "CWE-798: Use of Hard-coded Credentials"
    owasp: "A07:2021 - Identification and Authentication Failures"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-hardcoded-secret.md

# Rule 3: HTTP URL (not localhost) — cleartext transmission
- id: js-http-url
  patterns:
  - pattern: |
      "http://$HOST..."
  - pattern-not: |
      "http://localhost..."
  - pattern-not: |
      "http://127.0.0.1..."
  - pattern-not: |
      "http://0.0.0.0..."
  message: "HTTP URL detected (not localhost). Use HTTPS for external URLs to prevent MITM attacks."
  severity: WARNING
  languages: [javascript, typescript]
  metadata:
    category: security
    cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-http-url.md

# Rule 4: SQL injection via string concatenation
- id: js-sql-injection
  patterns:
  - pattern-either:
    - pattern: |
        `$SQL_QUERY ${$VAR} ...`
    - pattern: |
        $DB.query("..." + $VAR + "...")
    - pattern: |
        $DB.query($STR + $VAR)
  message: "SQL query constructed with string interpolation/concatenation. Use parameterized queries."
  severity: ERROR
  languages: [javascript, typescript]
  metadata:
    category: security
    cwe: "CWE-89: SQL Injection"
    owasp: "A03:2021 - Injection"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-sql-injection.md

# Rule 5: Command injection via child_process
- id: js-command-injection
  patterns:
  - pattern-either:
    - pattern: |
        require("child_process").exec($CMD, ...)
    - pattern: |
        child_process.exec($CMD, ...)
    - pattern: |
        $CP.exec($CMD, ...)
    - pattern: |
        require("child_process").execSync($CMD, ...)
  message: "child_process.exec() with string argument is vulnerable to command injection. Use execFile() with array arguments or sanitize input."
  severity: ERROR
  languages: [javascript, typescript]
  metadata:
    category: security
    cwe: "CWE-78: OS Command Injection"
    owasp: "A03:2021 - Injection"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-command-injection.md

# Rule 6: Insecure YAML load (js-yaml)
- id: js-yaml-unsafe-load
  patterns:
  - pattern-either:
    - pattern: |
        require("js-yaml").load($DATA, {schema: $SCHEMA})
    - pattern: |
        yaml.load($DATA, {schema: $SCHEMA})
  - pattern-not: |
      require("js-yaml").load($DATA, {schema: yaml.DEFAULT_SCHEMA})
  - pattern-not: |
      require("js-yaml").safeLoad($DATA)
  message: "Unsafe YAML load with custom schema. Use yaml.safeLoad() or DEFAULT_SCHEMA to prevent arbitrary code execution."
  severity: ERROR
  languages: [javascript, typescript]
  metadata:
    category: security
    cwe: "CWE-502: Deserialization of Untrusted Data"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-yaml-unsafe-load.md

# Rule 7: JWT weak algorithm
- id: js-jwt-weak-algorithm
  patterns:
  - pattern-either:
    - pattern: |
        jwt.sign($DATA, $SECRET, {algorithm: "none"})
    - pattern: |
        jwt.sign($DATA, $SECRET, {algorithm: "HS256"})
    - pattern: |
        jwt.verify($TOKEN, $SECRET, {algorithms: ["none"]})
  message: "JWT with weak algorithm (none/HS256). Use RS256 or ES256 for production."
  severity: ERROR
  languages: [javascript, typescript]
  metadata:
    category: security
    cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
    owasp: "A02:2021 - Cryptographic Failures"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-jwt-weak-algorithm.md

# Rule 8: Path traversal
- id: js-path-traversal
  patterns:
  - pattern-either:
    - pattern: |
        require("path").join($BASE, $USER_INPUT)
    - pattern: |
        path.join($BASE, $USER_INPUT)
    - pattern: |
        fs.readFile(path.join($BASE, $USER_INPUT), ...)
    - pattern: |
        fs.readFileSync(path.join($BASE, $USER_INPUT), ...)
  - pattern-not-inside: |
      if ($USER_INPUT.includes("..")) { ... }
  message: "Potential path traversal. Validate user input does not contain '..' or use path.resolve() with boundary checks."
  severity: WARNING
  languages: [javascript, typescript]
  metadata:
    category: security
    cwe: "CWE-22: Improper Limitation of a Pathname"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-path-traversal.md

# Rule 9: Insecure random for security purposes
- id: js-insecure-random
  patterns:
  - pattern-either:
    - pattern: |
        Math.random()
  - pattern-inside: |
      function $FUNC(...$ARGS) {
        ...
        $TOKEN = Math.random()
        ...
      }
  - pattern-inside: |
      function $FUNC(...$ARGS) {
        ...
        $PASSWORD = Math.random()
        ...
      }
  message: "Math.random() is not cryptographically secure. Use crypto.randomBytes() or crypto.getRandomValues() for security-sensitive values."
  severity: WARNING
  languages: [javascript, typescript]
  metadata:
    category: security
    cwe: "CWE-338: Use of Cryptographically Weak PRNG"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-insecure-random.md

# Rule 10: Disabled TLS certificate verification
- id: js-disabled-tls-verify
  patterns:
  - pattern-either:
    - pattern: |
        require("https").request($OPTS, ...)
    - pattern: |
        $HTTPS.request($OPTS, ...)
  - pattern-inside: |
      {..., rejectUnauthorized: false, ...}
  message: "TLS certificate verification disabled (rejectUnauthorized: false). This enables MITM attacks. Never disable in production."
  severity: ERROR
  languages: [javascript, typescript]
  metadata:
    category: security
    cwe: "CWE-295: Improper Certificate Validation"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-disabled-tls-verify.md

# Rule 11: Prototype pollution
- id: js-prototype-pollution
  patterns:
  - pattern-either:
    - pattern: |
        $OBJ.__proto__.$KEY = $VALUE
    - pattern: |
        $OBJ.constructor.prototype.$KEY = $VALUE
    - pattern: |
        Object.assign($OBJ.__proto__, $SRC)
  message: "Prototype pollution detected. Modifying __proto__ or constructor.prototype can affect all objects. Use Object.create(null) or Map instead."
  severity: ERROR
  languages: [javascript, typescript]
  metadata:
    category: security
    cwe: "CWE-1321: Prototype Pollution"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-prototype-pollution.md

# Rule 12: Regex denial of service (ReDoS)
- id: js-redos-vulnerable-regex
  patterns:
  - pattern-either:
    - pattern: |
        new RegExp($PATTERN)
  - metavariable-regex:
      metavariable: $PATTERN
      regex: .*(\\w|\\d|\\s|\\.)\+\+.*|.*(\(.*\|.*\)\+).*|.*(\[.*\])\+\+.*
  message: "Potentially vulnerable regex pattern (nested quantifiers). Can cause catastrophic backtracking. Simplify the pattern or use safe-regex to validate."
  severity: WARNING
  languages: [javascript, typescript]
  metadata:
    category: security
    cwe: "CWE-1333: Inefficient Regular Expression Complexity"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-redos-vulnerable-regex.md

# Rule 13: Uncaught promise rejection in auth flows
- id: js-uncaught-promise-auth
  patterns:
  - pattern: |
      $AUTH_METHOD().then($FUNC)
  - pattern-not: |
      $AUTH_METHOD().then($FUNC).catch($HANDLER)
  - pattern-not: |
      try { await $AUTH_METHOD() } catch ($E) { ... }
  message: "Promise chain in auth flow without .catch(). Unhandled rejections can crash the process and leak error details."
  severity: WARNING
  languages: [javascript, typescript]
  metadata:
    category: error-handling
    cwe: "CWE-755: Improper Handling of Exceptional Conditions"
    source: supercent-io/security-best-practices
    documentation_url: https://github.com/supercent-io/security-best-practices/blob/main/rules/js-uncaught-promise-auth.md
